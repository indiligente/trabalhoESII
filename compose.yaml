services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    #env_file:
    # - ./rabbitmq/.env
    networks:
      - platform_network

  postgres:
    image: postgres:14-alpine
    restart: always
    ports:
      - "5432:5432"
    #env_file:
    # - ./postgres/.env
    networks:
      - platform_network
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - platform_network

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: [ "CMD-SHELL", "ollama list || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - platform_network

  service-memory:
    build: ./service-memory
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    #env_file:
    # - ./service-memory/.env
    networks:
      - platform_network

  ollama-pull-embed:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "nomic-embed-text"]
    networks:
      - plataforma-network
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - plataforma-network
    healthcheck:
      # A imagem oficial do Qdrant não tem wget/curl — checamos a porta TCP via /dev/tcp do bash.
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  llm-gateway:
    build: ./llm-gateway
    ports:
      - "8767:8767"
    depends_on:
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8767/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  retrieval-service:
    build: ./retrieval-service
    ports:
      - "8766:8766"
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://naming-server:8761/eureka
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6334"
      OLLAMA_BASE_URL: http://ollama:11434
      EMBEDDING_MODEL: nomic-embed-text
    networks:
      - plataforma-network
    depends_on:
      naming-server:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama-pull-embed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8766/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Aplicação ─────────────────────────────────────────────────────────────────

  agent-service:
    build: ./agent-service
    ports:
      - "8765:8765"
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://naming-server:8761/eureka
    networks:
      - plataforma-network
    depends_on:
      naming-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      llm-gateway:
        condition: service_healthy
      retrieval-service:
        condition: service_healthy

networks:
  platform_network:
    driver: bridge

volumes:
  db_data:
  ollama_data:
  qdrant_data:
