services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    #env_file:
    # - ./rabbitmq/.env
    networks:
      - platform_network

  postgres:
    image: postgres:14-alpine
    restart: always
    ports:
      - "5432:5432"
    #env_file:
    # - ./postgres/.env
    networks:
      - platform_network
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - platform_network

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: [ "CMD-SHELL", "ollama list || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - platform_network

  service-memory:
    build: ./service-memory
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    #env_file:
    # - ./service-memory/.env
    networks:
      - platform_network

  llm-gateway:
    build: ./llm-gateway
    ports:
      - "8767:8767"
    depends_on:
      ollama:
        condition: service_healthy
    env_file:
      - ./llm-gateway/.env
    networks:
      - platform_network

networks:
  platform_network:
    driver: bridge

volumes:
  db_data:
  ollama_data:
