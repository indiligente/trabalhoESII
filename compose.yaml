services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - platform_network

  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - platform_network
    depends_on:
      - api-gateway
      - agent-service
      - retrieval-service
      - tool-registry
      - naming-server

  grafana:
    image: grafana/grafana:11.3.1
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - platform_network
    depends_on:
      - prometheus

  postgres:
    image: postgres:14-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - platform_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  redis:
    image: redis:7-alpine
    networks:
      - platform_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - platform_network

  # Apenas executa os comandos para baixar os modelos
  ollama-pull-embed:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "nomic-embed-text"]
    networks:
      - platform_network
    depends_on:
      - ollama

  ollama-pull-llm:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "qwen2.5:0.5b"]
    networks:
      - platform_network
    depends_on:
      - ollama

  service-memory:
    build: ./service-memory
    ports:
      - "8000:8000"
    command: bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://root:root@postgres:5432/postgres
      REDIS_URL: redis://redis:6379/0
    networks:
      - platform_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - platform_network

  llm-gateway:
    build: ./llm-gateway
    ports:
      - "8767:8767"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      LLM_MODEL: qwen2.5:0.5b
    networks:
      - platform_network
    depends_on:
      - ollama
      - ollama-pull-llm

  retrieval-service:
    build: ./retrieval-service
    ports:
      - "8766:8766"
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6334"
      OLLAMA_BASE_URL: http://ollama:11434
      EMBEDDING_MODEL: nomic-embed-text
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "true"
      EUREKA_CLIENT_FETCH_REGISTRY: "true"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://naming-server:8761/eureka/"
    networks:
      - platform_network
    depends_on:
      naming-server:
        condition: service_healthy
      qdrant:
        condition: service_started
      ollama-pull-embed:
        condition: service_completed_successfully

  agent-service:
    build: ./agent-service
    ports:
      - "8765:8765"
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_DATA_REDIS_HOST: redis
      LLM_GATEWAY_URL: http://llm-gateway:8767
      TOOL_REGISTRY_URL: http://tool-registry:8400
      RETRIEVAL_SERVICE_URL: http://retrieval-service:8766
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "true"
      EUREKA_CLIENT_FETCH_REGISTRY: "true"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://naming-server:8761/eureka/"
      SPRING_AI_OLLAMA_CHAT_ENABLED: "false"
      SPRING_AI_OLLAMA_EMBEDDING_ENABLED: "false"
      SPRING_AI_VECTORSTORE_QDRANT_ENABLED: "false"
    networks:
      - platform_network
    depends_on:
      naming-server:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      llm-gateway:
        condition: service_started
      retrieval-service:
        condition: service_started
      service-memory:
        condition: service_healthy

  tool-registry:
    build: ./tool-registry
    ports:
      - "8082:8400"
    environment:
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: "true"
      EUREKA_CLIENT_FETCH_REGISTRY: "true"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://naming-server:8761/eureka/"
    networks:
      - platform_network
    depends_on:
      naming-server:
        condition: service_healthy

  naming-server:
    build: ./naming-server
    ports:
      - "8761:8761"
    networks:
      - platform_network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8761/eureka/apps >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://naming-server:8761/eureka/
      LLM_GATEWAY_URL: http://llm-gateway:8767
      MEMORY_SERVICE_URL: http://service-memory:8000
    networks:
      - platform_network
    depends_on:
      naming-server:
        condition: service_healthy
      agent-service:
        condition: service_started
      retrieval-service:
        condition: service_started
      tool-registry:
        condition: service_started

networks:
  platform_network:
    driver: bridge

volumes:
  db_data:
  ollama_data:
  qdrant_data:
  grafana_data:
