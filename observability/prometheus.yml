global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-gateway:8080"]

  - job_name: agent-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["agent-service:8765"]

  - job_name: retrieval-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["retrieval-service:8766"]

  - job_name: tool-registry
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["tool-registry:8400"]

  - job_name: naming-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["naming-server:8761"]
